<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>اختبار برنامج الماجستير المصغر في الترجمة واللغة الإنجليزية</title>

    <style>

        :root {

            --primary-blue: #273c75;
            --accent-gold: #fbc531;
            --success-green: #44bd32;
            --error-red: #c23616;
            --white: #ffffff;
            --wa-green: #25D366;

        }

        body {

            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #192a56 0%, #273c75 100%);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

        }

        #main-container {

            background: white;
            width: 100%;
            max-width: 700px;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-top: 10px solid var(--accent-gold);
            text-align: center;

        }

        .platform-name {

            background: linear-gradient(90deg, #273c75, #192a56);
            color: white;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);

        }

        h1 {

            color: var(--primary-blue);
            margin-bottom: 5px;
            font-size: 1.8rem;

        }

        .subtitle {

            color: var(--accent-gold);
            font-weight: bold;
            margin-bottom: 25px;

        }

        .progress-bar-bg {

            background: #dcdde1;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;

        }

        #progress-fill {

            background: var(--accent-gold);
            width: 0%;
            height: 100%;
            transition: width 0.4s ease;

        }

        .question-container {

            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.7;
            color: var(--primary-blue);
            min-height: 70px;

        }

        .options-list {

            display: grid;
            gap: 12px;

        }

        .option-btn {

            padding: 16px;
            border: 2px solid #dcdde1;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            text-align: right;
            transition: 0.3s;
            color: var(--primary-blue);

        }

        .option-btn:hover:not(:disabled) {

            background: #f5f6fa;
            border-color: var(--primary-blue);

        }

        .is-correct {

            background: var(--success-green) !important;
            color: white !important;
            border-color: var(--success-green) !important;

        }

        .is-wrong {

            background: var(--error-red) !important;
            color: white !important;
            border-color: var(--error-red) !important;

        }

        #info-box {

            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #f5f6fa;
            border-right: 5px solid var(--primary-blue);
            text-align: right;
            line-height: 1.7;

        }

        #final-screen {

            display: none;

        }

        .score-display {

            font-size: 4rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin: 20px 0;

        }

        input {

            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #dcdde1;
            margin-bottom: 20px;
            font-size: 1rem;
            text-align: center;
            box-sizing: border-box;

        }

        .whatsapp-link {

            background: var(--wa-green);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;

        }

        .whatsapp-link:hover {

            transform: translateY(-2px);
            opacity: 0.95;

        }

    </style>

</head>

<body>

<div id="main-container">

    <div class="platform-name">

        منصة البرامج التخصصية | إدارة محمد طه

    </div>

    <div id="quiz-ui">

        <h1>🎓 اختبار برنامج الماجستير المصغر في الترجمة واللغة الإنجليزية</h1>

        <div class="subtitle">

            المبالغة • نبرة النص • الاتساق والانسجام • التعديل والترجمة

        </div>

        <div class="progress-bar-bg">

            <div id="progress-fill"></div>

        </div>

        <div id="question-text" class="question-container">

            جاري تحميل الأسئلة...

        </div>

        <div id="options-box" class="options-list"></div>

        <div id="info-box"></div>

    </div>

    <div id="final-screen">

        <div class="score-display" id="total-score">0</div>

        <h2>أحسنت 👏 لقد أكملت الاختبار بنجاح</h2>

        <p>أدخل اسمك لإرسال النتيجة:</p>

        <input type="text" id="user-name" placeholder="اكتب اسمك هنا">

        <button class="whatsapp-link" onclick="handleWhatsApp()">

            إرسال النتيجة عبر واتساب

        </button>

    </div>

</div>

<audio id="successSound" preload="auto">

    <source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg">

</audio>

<script>

const questions = [

{
    q: "ما المقصود بالمبالغة (Exaggeration) في الترجمة؟",
    a: [
        "حذف الكلمات غير المهمة",
        "تضخيم المعنى لإحداث تأثير أقوى",
        "ترجمة الأرقام فقط",
        "تغيير لغة النص"
    ],
    c: 1,
    exp: "شرح: المبالغة تستخدم لإبراز المعنى أو التأثير العاطفي في النص."
},

{
    q: "صيغة التأكيد في اللغة الإنجليزية تستخدم من أجل:",
    a: [
        "إضعاف الرسالة",
        "إظهار الشك",
        "تعزيز المعنى والتأكيد عليه",
        "تقليل وضوح النص"
    ],
    c: 2,
    exp: "شرح: أدوات التأكيد تجعل الرسالة أكثر قوة ووضوحاً."
},

{
    q: "ما المقصود بنبرة النص (Tone of Text)؟",
    a: [
        "لون الخط",
        "أسلوب ومشاعر الكاتب داخل النص",
        "عدد الكلمات",
        "نوع الورق"
    ],
    c: 1,
    exp: "شرح: النبرة تعكس موقف الكاتب ومشاعره تجاه الموضوع."
},

{
    q: "ورشة تحليل الأخطاء تهدف إلى:",
    a: [
        "تكرار الأخطاء",
        "تحسين جودة الترجمة واللغة",
        "إلغاء المراجعة",
        "تقليل فهم النص"
    ],
    c: 1,
    exp: "شرح: تحليل الأخطاء يساعد على تطوير مهارات الترجمة والكتابة."
},

{
    q: "عند ترجمة الأرقام والتواريخ يجب:",
    a: [
        "تغييرها عشوائياً",
        "الحفاظ على دقتها وصيغتها المناسبة",
        "حذفها",
        "ترجمتها حرفياً دائماً"
    ],
    c: 1,
    exp: "شرح: الأرقام والتواريخ تحتاج إلى دقة عالية أثناء الترجمة."
},

{
    q: "الاتساق (Consistency) في الترجمة يعني:",
    a: [
        "استخدام مصطلحات موحدة طوال النص",
        "تغيير المصطلحات باستمرار",
        "إهمال المعاني",
        "ترجمة نصف النص فقط"
    ],
    c: 0,
    exp: "شرح: الاتساق يحافظ على وضوح النص واحترافيته."
},

{
    q: "الانسجام (Coherence) في النص يعني:",
    a: [
        "ترتيب الأفكار بشكل مترابط",
        "استخدام كلمات عشوائية",
        "زيادة الأخطاء",
        "إلغاء الفقرات"
    ],
    c: 0,
    exp: "شرح: الانسجام يجعل النص مفهوماً وسهل القراءة."
},

{
    q: "ما المقصود بالاقتراض (Borrowing) في الترجمة؟",
    a: [
        "حذف الكلمة الأجنبية",
        "استخدام الكلمة الأجنبية كما هي داخل اللغة المنقول إليها",
        "تغيير معنى الجملة",
        "إضافة كلمات جديدة"
    ],
    c: 1,
    exp: "شرح: الاقتراض يعني نقل المصطلح الأجنبي كما هو عند الحاجة."
},

{
    q: "التعريب يهدف إلى:",
    a: [
        "إبقاء الكلمات الأجنبية دون تعديل",
        "تحويل المصطلحات الأجنبية إلى صيغة عربية مناسبة",
        "إلغاء المعنى",
        "تقليل وضوح النص"
    ],
    c: 1,
    exp: "شرح: التعريب يساعد على دمج المصطلحات داخل اللغة العربية."
},

{
    q: "ما المقصود بالتعديل (Modulation) في الترجمة؟",
    a: [
        "نسخ النص حرفياً",
        "تغيير زاوية التعبير مع الحفاظ على المعنى",
        "حذف النص بالكامل",
        "ترجمة كلمة بكلمة فقط"
    ],
    c: 1,
    exp: "شرح: التعديل أسلوب ترجمي يغيّر طريقة التعبير لإيصال المعنى الطبيعي."
}

];

let currentIdx = 0;

let userScore = 0;

const successSound = document.getElementById("successSound");

function playSuccessSound() {

    successSound.pause();

    successSound.currentTime = 0;

    const playPromise = successSound.play();

    if (playPromise !== undefined) {

        playPromise.then(() => {}).catch(() => {});

    }

}

function displayQuestion() {

    if (currentIdx >= questions.length) {

        showFinalResults();

        return;

    }

    const currentQ = questions[currentIdx];

    document.getElementById("question-text").innerText =
        (currentIdx + 1) + ". " + currentQ.q;

    document.getElementById("info-box").style.display = "none";

    document.getElementById("progress-fill").style.width =
        ((currentIdx + 1) / questions.length * 100) + "%";

    const optionsBox = document.getElementById("options-box");

    optionsBox.innerHTML = "";

    currentQ.a.forEach((option, i) => {

        const btn = document.createElement("button");

        btn.className = "option-btn";

        btn.innerText = option;

        btn.onclick = () => validateSelection(i, btn);

        optionsBox.appendChild(btn);

    });

}

function validateSelection(selectedIdx, btn) {

    const correctIdx = questions[currentIdx].c;

    const allBtns = document.querySelectorAll(".option-btn");

    allBtns.forEach(b => b.disabled = true);

    const info = document.getElementById("info-box");

    info.innerText = questions[currentIdx].exp;

    info.style.display = "block";

    if (selectedIdx === correctIdx) {

        btn.classList.add("is-correct");

        playSuccessSound();

        userScore++;

    } else {

        btn.classList.add("is-wrong");

        allBtns[correctIdx].classList.add("is-correct");

    }

    setTimeout(() => {

        currentIdx++;

        displayQuestion();

    }, 3000);

}

function showFinalResults() {

    document.getElementById("quiz-ui").style.display = "none";

    document.getElementById("final-screen").style.display = "block";

    document.getElementById("total-score").innerText =
        userScore + " / " + questions.length;

}

function handleWhatsApp() {

    const name = document.getElementById("user-name").value;

    if (!name) {

        alert("من فضلك اكتب اسمك.");

        return;

    }

    const message = encodeURIComponent(

`مرحباً،
لقد أكملت اختبار "برنامج الماجستير المصغر في الترجمة واللغة الإنجليزية".

الاسم: ${name}

النتيجة: ${userScore} من ${questions.length}`

    );

    window.open(`https://wa.me/249901946410?text=${message}`);

}

displayQuestion();

</script>

</body>

</html>
