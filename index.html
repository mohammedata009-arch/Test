<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماجستير الإدارة 100,000م | سيكولوجية الفرق</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --correct: #00ff88;
            --wrong: #ff4444;
            --bg-dark: #050508;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #app-container {
            width: 95%;
            max-width: 800px;
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.1);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; background: linear-gradient(to left, var(--neon-cyan), var(--neon-magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .header p { color: #888; letter-spacing: 2px; }

        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }

        .question-card { display: none; animation: slideIn 0.5s ease-out; }
        .question-card.active { display: block; }

        .q-text { font-size: 1.5rem; margin-bottom: 30px; line-height: 1.4; border-right: 4px solid var(--neon-cyan); padding-right: 15px; }

        .options-list { display: grid; gap: 15px; }
        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
            position: relative;
        }

        .option:hover { background: rgba(0, 243, 255, 0.1); border-color: var(--neon-cyan); transform: translateX(-5px); }
        
        .option.correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--correct) !important; color: var(--correct); }
        .option.wrong { background: rgba(255, 68, 68, 0.2) !important; border-color: var(--wrong) !important; color: var(--wrong); }

        .explanation { 
            margin-top: 20px; 
            padding: 15px; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 10px; 
            display: none; 
            color: var(--neon-cyan);
            font-style: italic;
        }

        #controls { margin-top: 30px; display: flex; justify-content: space-between; }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .next-btn { background: var(--neon-cyan); color: #000; display: none; }
        .whatsapp-btn { background: #25D366; color: white; width: 100%; font-size: 1.2rem; margin-top: 20px; display: none; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <h1>سيكولوجية الفرق 100K</h1>
        <p>إعداد الأستاذ: محمد طه عطا المنان</p>
    </div>

    <div class="stats-bar">
        <span>السؤال: <span id="current-q-num">1</span>/10</span>
        <span>النقاط: <span id="live-score">0</span></span>
    </div>

    <div id="quiz-engine">
        </div>

    <div id="controls">
        <button id="next-btn" class="btn next-btn" onclick="nextQuestion()">السؤال التالي ⮕</button>
    </div>

    <div id="final-screen" style="display:none; text-align:center;">
        <h2 style="font-size: 3rem;">تمت المهمة بنجاح!</h2>
        <p id="final-grade" style="font-size: 1.5rem; color: var(--neon-cyan);"></p>
        <button onclick="sendResult()" class="btn whatsapp-btn" style="display:block;">إرسال النتائج النهائية لواتساب الأستاذ 📱</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "ما هو جوهر 'الأمان النفسي' للمتدربين؟", opts: ["عدم وجود خلافات", "القدرة على المخاطرة دون خوف من العقاب", "توفير وجبات مجانية"], ans: 1, why: "الأمان النفسي يسمح لكم بالإبداع والتعلم من الأخطاء دون خجل." },
        { q: "في 'نافذة جوهاري'، ماذا تمثل منطقة الأسرار؟", opts: ["ما يعرفه المتدرب عن نفسه ويخفيه عن الفريق", "ما يعرفه الفريق ويجهله المتدرب", "معلومات مجهولة للجميع"], ans: 0, why: "توسيع المنطقة المفتوحة عبر كشف الأسرار المهنية يزيد الثقة." },
        { q: "ظاهرة 'التفكير الجماعي' تؤدي عادة إلى:", opts: ["قرارات عبقرية", "قرارات ضعيفة بسبب غياب النقد", "تأخر في اتخاذ القرار"], ans: 1, why: "احذروا الموافقة الجماعية السريعة؛ فهي تقتل التفكير النقدي." },
        { q: "عند استخدام 'القبعات الست'، ما وظيفة القبعة السوداء؟", opts: ["التفاؤل", "الحذر وكشف المخاطر", "المشاعر"], ans: 1, why: "القبعة السوداء تحمي الفريق من الكوارث المحتملة قبل وقوعها." },
        { q: "ما هو 'التسكع الاجتماعي'؟", opts: ["بذل جهد أقل عند العمل الجماعي", "الدردشة أثناء العمل", "الهروب من الاجتماع"], ans: 0, why: "لمنع ذلك، يجب تحديد مسؤولية واضحة لكل متدرب في الفريق." },
        { q: "مصفوفة RACI، ماذا يعني حرف R؟", opts: ["المسؤول عن التنفيذ (Responsible)", "الرئيس (Root)", "القارئ (Reader)"], ans: 0, why: "الـ Responsible هو من يقوم بالعمل الفعلي بيده." },
        { q: "مرحلة 'إعادة التجميد' في إدارة التغيير تهدف إلى:", opts: ["إلغاء التغيير", "تثبيت السلوكيات الجديدة", "البدء من الصفر"], ans: 1, why: "بدون تثبيت (Refreezing)، قد يعود المتدربون لعاداتهم القديمة." },
        { q: "الذكاء العاطفي للفريق يعني:", opts: ["البكاء معاً", "إدارة المشاعر الجماعية بفعالية", "تجاهل المشاعر تماماً"], ans: 1, why: "الفريق الذي يدير مشاعره يتجاوز الأزمات أسرع بـ 10 أضعاف." },
        { q: "في التفكير التصميمي، 'النمذجة' تهدف إلى:", opts: ["بيع المنتج فوراً", "تحويل الفكرة لشيء ملموس للاختبار", "كتابة تقرير طويل"], ans: 1, why: "النموذج الأولي يختصر عليكم سنوات من النقاش العقيم." },
        { q: "القيادة الخادمة (Servant Leadership) ترتكز على:", opts: ["خدمة القائد", "دعم المتدربين وتطويرهم كأولوية", "إصدار الأوامر فقط"], ans: 1, why: "القائد الحقيقي هو من يمهد الطريق لنجاح المتدربين." }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = freq; g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function initQuiz() {
        const container = document.getElementById('quiz-engine');
        quizData.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = `question-card ${i === 0 ? 'active' : ''}`;
            card.id = `q-${i}`;
            card.innerHTML = `
                <div class="q-text">${item.q}</div>
                <div class="options-list">
                    ${item.opts.map((o, idx) => `<div class="option" onclick="handleSelect(${i}, ${idx})">${o}</div>`).join('')}
                </div>
                <div id="explain-${i}" class="explanation"></div>
            `;
            container.appendChild(card);
        });
    }

    function handleSelect(qIdx, optIdx) {
        if (answered) return;
        answered = true;
        
        const correct = quizData[qIdx].ans;
        const options = document.querySelectorAll(`#q-${qIdx} .option`);
        const explainBox = document.getElementById(`explain-${qIdx}`);
        
        options[optIdx].classList.add(optIdx === correct ? 'correct' : 'wrong');
        options[correct].classList.add('correct'); // إظهار الإجابة الصحيحة دائماً
        
        if (optIdx === correct) {
            score++;
            document.getElementById('live-score').innerText = score;
            beep(800);
        } else {
            beep(200);
        }

        explainBox.innerText = "التوضيح للمتدربين: " + quizData[qIdx].why;
        explainBox.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        document.getElementById(`q-${currentIdx}`).classList.remove('active');
        currentIdx++;
        answered = false;
        document.getElementById('next-btn').style.display = 'none';

        if (currentIdx < quizData.length) {
            document.getElementById(`q-${currentIdx}`).classList.add('active');
            document.getElementById('current-q-num').innerText = currentIdx + 1;
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById('quiz-engine').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        document.getElementById('final-grade').innerText = `تم تحقيق نتيجة: ${score} من 10`;
    }

    function sendResult() {
        const phone = "0901946410";
        const msg = `اختبار سيكولوجية الفرق 100K\nالإنجاز: ${score}/10\nالمتدربون أكملوا الرحلة بنجاح تحت إشراف الأستاذ محمد طه.`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    initQuiz();
</script>
</body>
</html>
