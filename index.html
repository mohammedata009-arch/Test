<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار الماجستير المصغر - الإدارة والتسويق</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37;
            --success: #27ae60;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .quiz-container {
            background: white;
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid var(--primary);
        }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .user-info { margin-bottom: 30px; display: flex; gap: 10px; }
        input[type="text"] { padding: 10px; flex: 1; border: 1px solid #ddd; border-radius: 5px; }
        .question { margin-bottom: 25px; padding: 15px; border-right: 4px solid var(--accent); background: #fcfcfc; }
        .question p { font-weight: bold; margin-bottom: 10px; }
        .options label { display: block; margin: 8px 0; cursor: pointer; transition: 0.2s; }
        .options input { margin-left: 10px; }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-submit:hover { background: #34495e; }
        #resultArea { display: none; text-align: center; margin-top: 20px; padding: 20px; border: 2px dashed var(--success); }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>اختبار وحدة التسويق المتقدمة</h1>
    
    <div class="user-info">
        <input type="text" id="userName" placeholder="أدخل اسم المتدرب الثلاثي..." required>
    </div>

    <form id="quizForm">
        <div id="questionsLayer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">اعتماد الإجابات واستخراج النتيجة</button>
    </form>

    <div id="resultArea">
        <h2 id="scoreText"></h2>
        <p>اضغط على الزر أدناه لإرسال نتيجتك رسمياً إلى الإدارة:</p>
        <button class="btn-submit" style="background: var(--success);" onclick="sendToWhatsApp()">إرسال النتيجة عبر WhatsApp</button>
    </div>
</div>

<script>
    const questions = [
        { q: "التموضع الذهني هو ما تفعله للمنتج في المصنع.", a: "خطأ" },
        { q: "أي من هذه الشركات تموضعت حول 'الأمان'؟", options: ["فيراري", "فولفو", "تويوتا"], a: "فولفو" },
        { q: "العنصر الذي يولد الإيرادات في المزيج التسويقي هو السعر.", a: "صح" },
        { q: "مزيج الخدمات يتكون من كم عنصر (P)؟", options: ["4", "5", "7"], a: "7" },
        { q: "الأفراد (People) هم جزء من مزيج الخدمات فقط وليس المنتجات المادية.", a: "صح" },
        { q: "الدليل المادي (Physical Evidence) يساعد في تقليل الشعور بالمخاطرة لدى عملاء الخدمات.", a: "صح" },
        { q: "التحول من منظور الشركة إلى منظور العميل يحول المنتج (Product) إلى:", options: ["التكلفة", "القيمة للعميل", "الاتصال"], a: "القيمة للعميل" },
        { q: "الخدمات تتسم بأنها قابلة للتخزين لفترات طويلة.", a: "خطأ" },
        { q: "في التموضع الذهني، الهدف هو احتلال 'رف ذهني' في عقل العميل.", a: "صح" },
        { q: "العمليات (Process) تعني تدفق الإجراءات لتقديم الخدمة.", a: "صح" }
    ];

    const qLayer = document.getElementById('questionsLayer');
    questions.forEach((item, index) => {
        let html = `<div class="question"><p>${index + 1}. ${item.q}</p><div class="options">`;
        let opts = item.options ? item.options : ["صح", "خطأ"];
        opts.forEach(opt => {
            html += `<label><input type="radio" name="q${index}" value="${opt}"> ${opt}</label>`;
        });
        html += `</div></div>`;
        qLayer.innerHTML += html;
    });

    let finalScore = 0;
    let name = "";

    function calculateScore() {
        name = document.getElementById('userName').value;
        if(!name) { alert("يرجى كتابة اسمكم أولاً"); return; }
        
        finalScore = 0;
        questions.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if(selected && selected.value === item.a) finalScore++;
        });

        document.getElementById('scoreText').innerText = `أهلاً بك يا ${name}، درجتك هي: ${finalScore} من ${questions.length}`;
        document.getElementById('resultArea').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function sendToWhatsApp() {
        const phone = "249901946410";
        const message = `الاسم: ${name}%0Aالنتيجة: ${finalScore} من 10%0Aتم اجتياز اختبار التموضع والمزيج التسويقي بنجاح.`;
        window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${message}`, '_blank');
    }
</script>

</body>
</html>
